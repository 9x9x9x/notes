<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPSC Advanced Knowledge Base</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Dynamic Base Theme (Defaults to Vue) -->
  <link id="docsify-theme-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Force Content to 95% Width for wide screens and mobile */
    .markdown-section {
      max-width: 95% !important;
      margin: 0 auto !important;
    }

    /* Ensure smooth transitions when changing themes/colors */
    body {
      transition: background-color 0.3s, color 0.3s;
    }
  </style>
</head>
<body>
  
  <div id="app">Initialising UPSC Vault Engine...</div>
  
  <script>
    // Configuration for the Docsify Engine
    window.$docsify = {
      name: 'UPSC Static Vault',
      
      // =========================================
      // NEW: Activate Coverpage and Navbar
      // =========================================
      coverpage: true,
      loadNavbar: true,
      
      // Makes the coverpage independent (scrolling down doesn't reveal the site, 
      // you MUST click the 'Enter Vault' button to proceed).
      onlyCover: false, 
      
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      placeholder: 'Search syllabus topics...',
      
      count: { countable: true, fontsize: '0.85em', color: 'rgb(90,90,90)' },
      progress: { position: "top", color: "var(--theme-color,#42b983)", height: "3px" },
      scrollToTop: { auto: true, text: '⬆', right: 20, bottom: 20, offset: 500 },

      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            const sidebar = document.querySelector('.sidebar');
            
            // The HTML for the sidebar controls
            const controlsHtml = `
              <div id="sidebar-controls" style="padding: 20px; border-top: 1px solid rgba(128,128,128,0.2); margin-top: 10px; margin-bottom: 30px;">
                <div style="font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--theme-color); margin-bottom: 12px; letter-spacing: 1px;">Preferences</div>
                
                <div style="margin-bottom: 12px;">
                  <div style="font-size: 11px; margin-bottom: 4px; font-weight: bold;">Accent Color</div>
                  <input type="color" id="color-picker" onchange="changeThemeColor(this.value)" style="width: 100%; height: 28px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; cursor: pointer; padding: 0;">
                </div>

                <div style="margin-bottom: 12px;">
                  <div style="font-size: 11px; margin-bottom: 4px; font-weight: bold;">Base Theme</div>
                  <select id="theme-selector" onchange="changeBaseTheme(this.value)" style="width: 100%; padding: 4px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(128,128,128,0.3); background: transparent; color: inherit; cursor: pointer;">
                    <option value="vue" style="color: #333;">Vue (Default Light)</option>
                    <option value="buble" style="color: #333;">Buble (Clean Light)</option>
                    <option value="pure" style="color: #333;">Pure (Minimalist)</option>
                    <option value="dark" style="color: #333;">Dark (Night Mode)</option>
                  </select>
                </div>

                <div>
                  <div style="font-size: 11px; margin-bottom: 4px; font-weight: bold;">Typography</div>
                  <select id="font-selector" onchange="changeLocalFont(this.value)" style="width: 100%; padding: 4px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(128,128,128,0.3); background: transparent; color: inherit; cursor: pointer;">
                    <option value="system-ui, -apple-system, sans-serif" style="color: #333;">System Default</option>
                    <option value="'Times New Roman', Times, serif" style="color: #333;">Serif (Textbook)</option>
                    <option value="Arial, Helvetica, sans-serif" style="color: #333;">Sans (Modern)</option>
                  </select>
                </div>
              </div>
            `;
            
            sidebar.insertAdjacentHTML('beforeend', controlsHtml);

            const savedTheme = localStorage.getItem('upsc_base_theme') || 'vue';
            const savedColor = localStorage.getItem('upsc_accent_color') || '#42b983';
            const savedFont = localStorage.getItem('upsc_vault_font') || 'system-ui, -apple-system, sans-serif';

            document.getElementById('theme-selector').value = savedTheme;
            document.getElementById('color-picker').value = savedColor;
            document.getElementById('font-selector').value = savedFont;
          });
        }
      ]
    }

    function changeBaseTheme(themeName) {
      const linkTag = document.getElementById('docsify-theme-css');
      linkTag.href = `https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/${themeName}.css`;
      localStorage.setItem('upsc_base_theme', themeName);
    }

    function changeThemeColor(hexColor) {
      document.documentElement.style.setProperty('--theme-color', hexColor);
      localStorage.setItem('upsc_accent_color', hexColor);
    }

    function changeLocalFont(fontFamily) {
      document.body.style.setProperty('font-family', fontFamily, 'important');
      localStorage.setItem('upsc_vault_font', fontFamily);
    }

    window.onload = function() {
      const savedTheme = localStorage.getItem('upsc_base_theme');
      const savedColor = localStorage.getItem('upsc_accent_color');
      const savedFont = localStorage.getItem('upsc_vault_font');

      if (savedTheme) changeBaseTheme(savedTheme);
      if (savedColor) changeThemeColor(savedColor);
      if (savedFont) changeLocalFont(savedFont);
    };
  </script>

  <!-- Core Docsify Engine & Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <script src="https://unpkg.com/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
  
</body>
</html>
