<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPSC Advanced Knowledge Base</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Initialising UPSC Vault Engine...</div>
  <script>
    window.$docsify = {
      name: 'UPSC Static Vault',
      loadSidebar: true,
      loadNavbar: true,     // Feature 3: Navbar enabled
      coverpage: true,      // Feature 2: Coverpage enabled
      subMaxLevel: 2,
      search: 'auto',
      placeholder: 'Search syllabus topics...',
      // Feature 1: Tab settings
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script> <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script> </body>
</html>
