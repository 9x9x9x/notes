<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPSC Static Knowledge Base</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Clean, minimalist theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Initialising UPSC Vault Engine...</div>
  <script>
    window.$docsify = {
      name: 'UPSC Static Vault',
      repo: '',
      // Enable sidebar navigation from your markdown configuration
      loadSidebar: true,
      // Nest headers inside the sidebar down to subheadings
      subMaxLevel: 2,
      // Enable automated text search across your local files
      search: 'auto',
      placeholder: 'Search syllabus topics...'
    }
  </script>
  <!-- Main Docsify Engine and necessary search parsing plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
